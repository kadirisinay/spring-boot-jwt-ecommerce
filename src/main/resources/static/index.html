<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli E-Ticaret Paneli</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e2f; color: #fff; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .panel { background: #2a2a40; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; }
        h2 { font-size: 18px; margin-top: 0; color: #00d2ff; border-bottom: 1px solid #444; padding-bottom: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background: #151521; color: #fff; }
        button { width: 100%; padding: 10px; background: #00d2ff; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #0098cc; }
        .product-btn { background: #ff9900; color: #000; }
        .product-btn:hover { background: #cc7a00; }
        #logArea { background: #000; color: #00ff00; padding: 15px; border-radius: 5px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 20px; word-wrap: break-word; width: 100%; max-width: 620px; }
        .status { font-size: 12px; color: #aaa; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="panel">
    <h2>🔑 Giriş Yap (Bilet Al)</h2>
    <input type="text" id="logUser" placeholder="Kullanıcı Adı">
    <input type="password" id="logPass" placeholder="Şifre">
    <button onclick="login()">Giriş Yap</button>
    <div id="tokenStatus" class="status">Cüzdan Boş (Bilet Yok) ❌</div>
</div>

<div class="panel">
    <h2>📦 Güvenli Ürün Ekle</h2>
    <input type="text" id="prodName" placeholder="Ürün Adı">
    <input type="number" id="prodPrice" placeholder="Fiyat">
    <input type="number" id="prodStock" placeholder="Stok">

    <select id="prodCategory" style="width: 96%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background: #151521; color: #fff;">
        <option value="1">Elektronik</option>
        <option value="2">Giyim</option>
        <option value="3">Ev Aletleri</option>
        <option value="4">Kitap</option>
    </select>

    <button class="product-btn" onclick="addProduct()">Sisteme Ürün Ekle</button>
</div>

<div id="logArea">Sistem hazır... Bilet almadan ürün eklemeyi dene!<br></div>

<script>
    function logMessage(msg) {
        const logBox = document.getElementById('logArea');
        logBox.innerHTML += `> ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // GİRİŞ YAP İSTEĞİ (Token Alır)
    async function login() {
        const u = document.getElementById('logUser').value;
        const p = document.getElementById('logPass').value;
        logMessage(`Giriş deneniyor: ${u}...`);

        const response = await fetch(`/api/auth/login?username=${u}&password=${p}`, { method: 'POST' });
        const result = await response.text();

        if (result.startsWith('eyJ')) {
            localStorage.setItem('myVipToken', result); // Bileti cebimize koyduk
            document.getElementById('tokenStatus').innerText = "Cüzdanda Bilet Var ✅";
            document.getElementById('tokenStatus').style.color = "#00ff00";
            logMessage("Bilet başarıyla alındı! Artık ürün ekleyebilirsin.");
        } else {
            logMessage("Hata: " + result);
        }
    }

    // ÜRÜN EKLEME İSTEĞİ (Eski kodun güvenlik biletli hali)
    async function addProduct() {
        // 1. Cüzdandan bileti çıkar
        const token = localStorage.getItem('myVipToken');

        if (!token) {
            logMessage("HATA: Biletin yok! Fedai seni içeri almadı. Önce giriş yap.");
            return;
        }

        // 2. Formdaki bilgileri al
        const name = document.getElementById('prodName').value;
        const price = document.getElementById('prodPrice').value;
        const stock = document.getElementById('prodStock').value;
        const categoryId = document.getElementById('prodCategory').value; // YENİ: Seçilen kategorinin ID'sini al

        // 3. Ürün nesnesini oluştur (Spring Boot'un beklediği JSON formatı)
        const productData = {
            name: name,
            price: parseFloat(price),
            stock: parseInt(stock),
            category: {
                id: parseInt(categoryId) // YENİ: Java tarafındaki @ManyToOne ilişkisi için objeye çeviriyoruz
            }
        };

        logMessage(`Ürün ekleniyor: ${name}...`);

        // 4. Sunucuya İstek At (BILET İLE BİRLİKTE!)
        const response = await fetch('/api/products', { // Ürün ekleme adresin farklıysa burayı düzelt!
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token // FEDAİYE BİLETİ BURADA GÖSTERİYORUZ!
            },
            body: JSON.stringify(productData)
        });

        if (response.status === 403) {
            logMessage("HATA: 403 Yasak! Biletin geçersiz veya süresi dolmuş.");
        } else if (response.ok) {
            logMessage("BAŞARILI: Ürün sisteme eklendi! 🎉");
        } else {
            logMessage("Sunucudan beklenmeyen bir cevap geldi.");
        }
    }
</script>
</body>
</html>
